services:
  - type: web
    name: epicc-ai-chat
    env: node
    plan: free
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: GEMINI_API_KEY
        sync: false
      - key: GROQ_API_KEY
        sync: false
      - key: SILICONFLOW_API_KEY
        sync: false
      - key: PORT
        value: 3000
