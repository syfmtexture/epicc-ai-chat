<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Epicc — Universal Chat Client</title>
  <meta name="description" content="A premium chat client supporting Google Gemini and Groq models with Google Drive sync." />
  <link rel="icon" type="image/png" href="/assets/icon.png" />

  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />

  <!-- Font Awesome Icons -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />

  <!-- Google Identity Services -->
  <script src="https://accounts.google.com/gsi/client" async defer></script>

  <!-- App Styles -->
  <link rel="stylesheet" href="/css/style.css" />
</head>
<body>

  <!-- ═══════════════════════════════════════════════════════════════════════ -->
  <!-- SIDEBAR -->
  <!-- ═══════════════════════════════════════════════════════════════════════ -->
  <aside id="sidebar" class="sidebar">
    <div class="sidebar-header">
      <div class="logo">
        <div class="logo-icon"><img src="/assets/icon.png" alt="Epicc Logo" style="width: 100%; height: 100%; object-fit: contain; border-radius: inherit;" /></div>
        <span class="logo-text">Epicc</span>
      </div>
      <button id="sidebar-close-btn" class="icon-btn sidebar-toggle-btn" title="Close sidebar">
        <i class="fa-solid fa-xmark"></i>
      </button>
    </div>

    <button id="new-chat-btn" class="new-chat-btn">
      <i class="fa-solid fa-plus"></i>
      <span>New Chat</span>
    </button>

    <div class="chat-history-section">
      <div class="section-label">Chat History</div>
      <div id="chat-history-list" class="chat-history-list">
        <!-- Dynamically populated -->
      </div>
    </div>

    <div class="sidebar-footer">
      <!-- Google Sync Status -->
      <div id="sync-status" class="sync-status" style="display:none;">
        <i class="fa-solid fa-cloud"></i>
        <span id="sync-status-text">Synced</span>
      </div>

      <!-- User Profile (shown when logged in) -->
      <div id="user-profile" class="user-profile" style="display:none;">
        <img id="user-avatar" class="user-avatar" src="" alt="User" referrerpolicy="no-referrer" />
        <div class="user-info">
          <span id="user-name" class="user-name"></span>
          <span id="user-email" class="user-email"></span>
        </div>
        <button id="logout-btn" class="icon-btn" title="Sign out"><i class="fa-solid fa-right-from-bracket"></i></button>
      </div>

      <!-- Sign In Button (shown when not logged in) -->
      <button id="google-signin-btn" class="google-signin-btn">
        <svg width="18" height="18" viewBox="0 0 48 48"><path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/><path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/><path fill="#34A853" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/><path fill="#FBBC05" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.15 1.45-4.92 2.3-8.16 2.3-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/></svg>
        <span>Sign in with Google</span>
      </button>

      <!-- Settings Button -->
      <button id="settings-btn" class="settings-btn" style="display:none !important;">
        <i class="fa-solid fa-gear"></i>
        <span>Settings</span>
      </button>
    </div>
  </aside>

  <!-- ═══════════════════════════════════════════════════════════════════════ -->
  <!-- MAIN CONTENT -->
  <!-- ═══════════════════════════════════════════════════════════════════════ -->
  <main id="main-content" class="main-content">

    <!-- Top Bar -->
    <header class="top-bar">
      <button id="sidebar-open-btn" class="icon-btn sidebar-toggle-btn" title="Open sidebar">
        <i class="fa-solid fa-bars"></i>
      </button>
      
      <select id="model-select" class="model-select" style="display: none;">
        <optgroup label="Google (AI Studio)">
          <option value="google/gemini-3.5-flash">Gemini 3.5 Flash</option>
          <option value="google/gemini-3.1-flash-lite">Gemini 3.1 Flash Lite</option>
          <option value="google/gemini-2.5-flash">Gemini 2.5 Flash</option>
          <option value="google/gemini-2.5-flash-lite">Gemini 2.5 Flash Lite</option>
          <option value="google/gemma-4-26b-a4b-it">Gemma 4 26B</option>
          <option value="google/gemma-4-31b-it">Gemma 4 31B</option>
        </optgroup>
        <optgroup label="Groq">
          <option value="groq/groq/compound">Groq Compound</option>
          <option value="groq/groq/compound-mini">Groq Compound Mini</option>
          <option value="groq/llama-3.1-8b-instant">Llama 3.1 8B Instant</option>
          <option value="groq/llama-3.3-70b-versatile">Llama 3.3 70B Versatile</option>
          <option value="groq/meta-llama/llama-4-scout-17b-16e-instruct">Llama 4 Scout 17B</option>
          <option value="groq/meta-llama/llama-prompt-guard-2-22m">Llama Prompt Guard 22M</option>
          <option value="groq/meta-llama/llama-prompt-guard-2-86m">Llama Prompt Guard 86M</option>
          <option value="groq/openai/gpt-oss-120b">GPT OSS 120B</option>
          <option value="groq/openai/gpt-oss-20b">GPT OSS 20B</option>
          <option value="groq/openai/gpt-oss-safeguard-20b">GPT OSS Safeguard 20B</option>
          <option value="groq/qwen/qwen3-32b">Qwen3 32B</option>
        </optgroup>
      </select>
      <select id="thinking-select" class="thinking-select" style="display: none;">
        <option value="low">Thinking: Low</option>
        <option value="high" selected>Thinking: High</option>
      </select>

      <!-- Thinking Mode Toggle -->
      <div class="model-selector-wrapper">
        <button id="thinking-toggle-btn" class="thinking-toggle-btn active" title="Toggle Thinking Mode">
          <i class="fa-solid fa-brain"></i>
          <span>Thinking</span>
          <span class="toggle-indicator"></span>
        </button>
      </div>

      <!-- Top Right shortcut buttons -->
      <div style="margin-left: auto; display: flex; align-items: center; gap: 8px;">
        <button id="topbar-new-chat-btn" class="icon-btn" title="New Chat">
          <i class="fa-regular fa-pen-to-square"></i>
        </button>
      </div>
    </header>

    <!-- Chat Viewport -->
    <div id="chat-viewport" class="chat-viewport">

      <!-- Welcome Screen (shown when no messages) -->
      <div id="welcome-screen" class="welcome-screen">
        <div class="welcome-icon">
          <img src="/assets/icon.png" alt="Epicc AI Logo" style="width: 100%; height: 100%; object-fit: contain;" />
        </div>
        <h1 id="welcome-title">The mic is yours</h1>
      </div>
 
      <!-- Messages Container -->
      <div id="messages-container" class="messages-container" style="display:none;">
        <!-- Dynamically populated -->
      </div>
 
    </div>
 
    <!-- Input Area -->
    <div class="input-area-wrapper">
      <div class="input-area">
        <textarea id="message-input" class="message-input" placeholder="Message Epicc..." rows="1"></textarea>
        <button id="send-btn" class="send-btn" title="Send message" disabled>
          <i class="fa-solid fa-arrow-up"></i>
        </button>
        <button id="stop-btn" class="stop-btn" title="Stop generating" style="display:none;">
          <i class="fa-solid fa-stop"></i>
        </button>
      </div>
      <div class="input-footer">
        <span class="input-footer-text">Epicc can make mistakes. Verify important info.</span>
      </div>
    </div>

  </main>

  <!-- ═══════════════════════════════════════════════════════════════════════ -->
  <!-- SETTINGS MODAL -->
  <!-- ═══════════════════════════════════════════════════════════════════════ -->
  <div id="settings-modal" class="modal-overlay" style="display:none;">
    <div class="modal">
      <div class="modal-header">
        <h2><i class="fa-solid fa-gear"></i> Settings</h2>
        <button id="settings-close-btn" class="icon-btn"><i class="fa-solid fa-xmark"></i></button>
      </div>
      <div class="modal-body">

        <!-- Google Auth Section -->
        <div class="settings-section">
          <h3><i class="fa-brands fa-google"></i> Google Account</h3>
          <div class="settings-field">
            <label for="google-client-id-input">Google OAuth Client ID</label>
            <input type="text" id="google-client-id-input" placeholder="xxxx.apps.googleusercontent.com" autocomplete="off" />
            <p class="field-hint">Create one at <a href="https://console.cloud.google.com/apis/credentials" target="_blank" rel="noopener">Google Cloud Console</a>. Enable the Google Drive API and add <code>http://localhost:3000</code> as an authorized JavaScript origin.</p>
          </div>
        </div>

        <!-- API Keys Section -->
        <div class="settings-section">
          <h3><i class="fa-solid fa-key"></i> API Keys</h3>
          <div class="settings-field">
            <label for="gemini-key-input">Google AI Studio API Key</label>
            <div class="key-input-wrapper">
              <input type="password" id="gemini-key-input" placeholder="Enter your Gemini API key" autocomplete="new-password" />
              <button class="toggle-key-btn" data-target="gemini-key-input"><i class="fa-solid fa-eye"></i></button>
            </div>
          </div>
          <div class="settings-field">
            <label for="groq-key-input">Groq API Key</label>
            <div class="key-input-wrapper">
              <input type="password" id="groq-key-input" placeholder="Enter your Groq API key" autocomplete="new-password" />
              <button class="toggle-key-btn" data-target="groq-key-input"><i class="fa-solid fa-eye"></i></button>
            </div>
          </div>
          <div class="settings-field">
            <label for="siliconflow-key-input">SiliconFlow API Key</label>
            <div class="key-input-wrapper">
              <input type="password" id="siliconflow-key-input" placeholder="Enter your SiliconFlow API key" autocomplete="new-password" />
              <button class="toggle-key-btn" data-target="siliconflow-key-input"><i class="fa-solid fa-eye"></i></button>
            </div>
          </div>
        </div>

        <!-- Generation Settings -->
        <div class="settings-section">
          <h3><i class="fa-solid fa-sliders"></i> Generation</h3>
          <div class="settings-field">
            <label for="system-prompt-input">System Prompt</label>
            <textarea id="system-prompt-input" rows="3" placeholder="You are a helpful assistant..."></textarea>
          </div>
          <div class="settings-row">
            <div class="settings-field">
              <label for="temperature-input">Temperature</label>
              <input type="number" id="temperature-input" min="0" max="2" step="0.1" value="0.7" />
            </div>
            <div class="settings-field">
              <label for="max-tokens-input">Max Tokens</label>
              <input type="number" id="max-tokens-input" min="1" max="131072" step="1" value="2048" />
            </div>
          </div>
        </div>

        <!-- Danger Zone -->
        <div class="settings-section danger-section">
          <h3><i class="fa-solid fa-triangle-exclamation"></i> Danger Zone</h3>
          <button id="clear-all-data-btn" class="danger-btn">
            <i class="fa-solid fa-trash"></i> Clear All Local Data
          </button>
        </div>
      </div>
      <div class="modal-footer">
        <button id="settings-save-btn" class="primary-btn">Save Settings</button>
      </div>
    </div>
  </div>

  <!-- ═══════════════════════════════════════════════════════════════════════ -->
  <!-- RENAME MODAL -->
  <!-- ═══════════════════════════════════════════════════════════════════════ -->
  <div id="rename-modal" class="modal-overlay" style="display:none;">
    <div class="modal modal-sm">
      <div class="modal-header">
        <h2>Rename Chat</h2>
        <button id="rename-close-btn" class="icon-btn"><i class="fa-solid fa-xmark"></i></button>
      </div>
      <div class="modal-body">
        <input type="text" id="rename-input" class="rename-input" placeholder="Chat name..." />
      </div>
      <div class="modal-footer">
        <button id="rename-cancel-btn" class="ghost-btn">Cancel</button>
        <button id="rename-save-btn" class="primary-btn">Save</button>
      </div>
    </div>
  </div>

  <!-- Scripts -->
  <script src="/js/markdown.js"></script>
  <script src="/js/drive.js"></script>
  <script src="/js/app.js"></script>

</body>
</html>
